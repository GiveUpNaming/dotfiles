# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"


format = """
$os\
$directory\
$git_branch\
$git_status\
$git_state\
$c\
$cmake\
$dotnet\
$golang\
$gradle\
$java\
$lua\
$nodejs\
$python\
$rust\
$package\
$fill\
$container\
$docker_context\
"""

[c]
symbol = "îک‍ "
format = "[$symbol($version(-$name))]($style) "
detect_extensions = ["c", "h", "cpp", "hpp", "cu"]
detect_files = ["Makefile", "CMakeLists.txt"]

[cmake]
format = "[cmake($symbol$version)]($style) "

[character]
# success_symbol = "[â‍œ](bold green)"
# error_symbol = "[âœ–](bold red)"
success_symbol = "[â‌¯](bold green)"
error_symbol = "[â‌¯](bold red)"

[container]
format = "[$symbol $name]($style) "

[directory]
use_os_path_sep = true
style = "#74c7ec"
repo_root_style = 'bold #89dceb'
repo_root_format = '[$before_root_path](dimmed $style)[$repo_root]($repo_root_style)[$path]($repo_root_style)[$read_only]($read_only_style) '
read_only = " َ°Œ¾"
format = '[$path]($style)[$read_only]($read_only_style) '
truncation_length = 3
truncate_to_repo = false
fish_style_pwd_dir_length = 1

[docker_context]
symbol = "ïŒˆ"
style = "#06969A"
format = "[$symbol $context]($style) "

[dotnet]
symbol = "â€¢NET "
format = "[$symbol$version( $tfm)]($style) "

[fill]
symbol = " "

[git_branch]
symbol = "ïگک"
style = "#96f169"
format = "[$symbol $branch(:$remote_branch)]($style) "

[git_status]
ahead = "â‡،${count} "
behind = "â‡£${count} "
conflicted = "[=]${count} "
deleted = "âœ•${count} "
diverged = "â‡•â‡،${ahead_count} â‡£${behind_count} "
modified = "!${count} "
staged = "+${count} "
stashed = "\\$${count} "
renamed = "آ»${count} "
untracked = "?${count} "
format = """
[$ahead_behind](#96f169)\
[$conflicted](italic red)\
[$stashed](#8fbcbb)\
[$deleted](#f07178)\
[$renamed](#f2a272)\
[$modified](#fab387)\
[$staged](#a9b665)\
[$untracked](#89b4fa)\
"""

[golang]
symbol = "îک§ go "
format = "[$symbol($version)]($style) "

[java]
symbol = "î‰– java"
style = "red"
format = '[$symbol ($version)]($style) '

[lua]
symbol = "îک  "
format = "[$symbol($version)]($style) "

[nodejs]
symbol = "îœک "
format = "[$symbol($version)]($style) "

